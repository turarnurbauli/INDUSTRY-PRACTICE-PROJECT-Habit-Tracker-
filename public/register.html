<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | HabitFlow</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container navbar-inner">
        <a href="/" class="brand"><span class="brand-icon">H</span><span>HabitFlow</span></a>
        <nav class="nav-links">
          <button id="themeToggle" class="btn btn-secondary btn-sm" type="button">Dark Mode</button>
          <a href="/login.html" class="btn btn-secondary btn-sm">Log In</a>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <h1>Create your account</h1>
        <p>Start building better habits today.</p>
        <div id="formAlert"></div>
        <form id="registerForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input class="form-control" id="name" name="name" type="text" required />
            <div id="nameError" class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" required />
            <div id="emailError" class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" required />
            <div id="passwordError" class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="phone">Phone (optional)</label>
            <input class="form-control" id="phone" name="phone" type="tel" placeholder="+7 700 123 4567" />
            <div id="phoneError" class="form-error"></div>
          </div>
          <button class="btn btn-primary" type="submit" style="width:100%">Sign Up</button>
        </form>
      </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/register.js"></script>
  </body>
</html>
