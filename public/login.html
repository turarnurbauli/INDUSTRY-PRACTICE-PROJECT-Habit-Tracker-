<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | HabitFlow</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container navbar-inner">
        <a href="/" class="brand"><span class="brand-icon">H</span><span>HabitFlow</span></a>
        <nav class="nav-links">
          <button id="themeToggle" class="btn btn-secondary btn-sm" type="button">Dark Mode</button>
          <a href="/register.html" class="btn btn-primary btn-sm">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p>Log in to continue tracking your habits.</p>
        <div id="formAlert"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" required />
            <div id="emailError" class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" required />
            <div id="passwordError" class="form-error"></div>
          </div>
          <button class="btn btn-primary" type="submit" style="width:100%">Log In</button>
        </form>
      </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
