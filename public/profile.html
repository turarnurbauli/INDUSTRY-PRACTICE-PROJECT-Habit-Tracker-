<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | HabitFlow</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container navbar-inner">
        <a href="/dashboard.html" class="brand"><span class="brand-icon">H</span><span>HabitFlow</span></a>
        <nav class="nav-links">
          <button id="themeToggle" class="btn btn-secondary btn-sm" type="button">Dark Mode</button>
          <a href="/dashboard.html" class="btn btn-secondary btn-sm">Dashboard</a>
          <button id="logoutBtn" class="btn btn-danger btn-sm" type="button">Log Out</button>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h1>My Profile</h1>
        <p style="color:var(--text-muted);margin-bottom:1.5rem;">Your account information and habit statistics.</p>
        <div id="profileAlert"></div>

        <div class="profile-grid">
          <article class="card">
            <h2>Account</h2>
            <div class="profile-item"><span>Name</span><strong id="profileName">-</strong></div>
            <div class="profile-item"><span>Email</span><strong id="profileEmail">-</strong></div>
            <div class="profile-item"><span>Phone</span><strong id="profilePhone">-</strong></div>
            <div class="profile-item"><span>Member since</span><strong id="profileCreated">-</strong></div>
          </article>
          <article class="card">
            <h2>Statistics</h2>
            <div class="profile-item"><span>Total habits</span><strong id="profileHabits">0</strong></div>
            <div class="profile-item"><span>Completion logs</span><strong id="profileLogs">0</strong></div>
          </article>
        </div>
      </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/profile.js"></script>
  </body>
</html>
